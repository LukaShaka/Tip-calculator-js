<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>


    <div class="container">

        <div class="box1">

            <div class="box2">
                <h2 id="textTitle">Tip Calculator</h2>
                <p class="textEnter">Enter the bill and tip amount to calculate the total.</p>
                <p class="textBill">Bill:</p>
                <p class="textTip">Tip Percentage:</p>
                <p class="textTotal">Total:</p>
                <button class="calculate">Calculate</button>
                <input type="number" class="tip"></input>
                <input type="number" class="bill"></input>
            </div>
        </div>

    </div>


    <script src="script.js">
    </script>







</html>
